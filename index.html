<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruffleCRM — Gestão de Produção Artesanal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --chocolate: #2D1A0E;
            --cacau: #5C3317;
            --trufa: #8B4513;
            --caramelo: #C68642;
            --ouro: #D4A853;
            --creme: #F5E6D3;
            --branco-creme: #FDF8F2;
            --rosa-trufa: #E8B4A0;
            --verde-menta: #4CAF7D;
            --vermelho-alerta: #E53935;
            --azul-info: #2196F3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--branco-creme);
            color: var(--chocolate);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: var(--chocolate);
            color: var(--creme);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(45,26,14,0.4);
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--ouro);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--ouro);
            letter-spacing: 1px;
        }
        .logo-sub { font-size: 10px; color: var(--rosa-trufa); letter-spacing: 2px; text-transform: uppercase; }
        .header-user { display: flex; align-items: center; gap: 16px; }
        .user-badge {
            background: var(--cacau);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--creme);
        }
        .btn-logout {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--creme);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }

        /* NAV */
        .nav {
            background: var(--cacau);
            border-bottom: 2px solid var(--ouro);
        }
        .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
        }
        .nav-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: var(--rosa-trufa);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .nav-btn:hover { color: var(--ouro); }
        .nav-btn.active { color: var(--ouro); border-bottom-color: var(--ouro); }

        /* LOGIN */
        .login-wrap {
            min-height: 100vh;
            background: var(--chocolate);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .login-wrap::before {
            content: '🍫🍬🎁🍫🍬🎁🍫🍬';
            position: absolute;
            font-size: 80px;
            opacity: 0.04;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            word-break: break-all;
            line-height: 1.2;
            letter-spacing: 10px;
        }
        .login-card {
            background: var(--branco-creme);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            position: relative;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--ouro), var(--caramelo));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--chocolate);
        }
        .login-sub { color: var(--trufa); font-size: 13px; margin-top: 4px; }
        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 12px; font-weight: 600; color: var(--trufa); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--creme);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            background: var(--branco-creme);
            color: var(--chocolate);
            transition: border-color 0.2s;
        }
        .input-field:focus { outline: none; border-color: var(--ouro); }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--trufa), var(--cacau));
            color: var(--ouro);
            border: none;
            border-radius: 12px;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        /* CONTENT */
        .content { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

        /* CARDS DE MÉTRICAS */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .metric-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(45,26,14,0.08);
            border-left: 4px solid var(--ouro);
            position: relative;
            overflow: hidden;
        }
        .metric-card::after {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 80px; height: 80px;
            background: var(--creme);
            border-radius: 50%;
        }
        .metric-card.verde { border-left-color: var(--verde-menta); }
        .metric-card.vermelho { border-left-color: var(--vermelho-alerta); }
        .metric-card.azul { border-left-color: var(--azul-info); }
        .metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--trufa); margin-bottom: 8px; }
        .metric-value { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--chocolate); }
        .metric-sub { font-size: 12px; color: #999; margin-top: 4px; }

        /* SECTION HEADER */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: gap; gap: 12px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--chocolate); }
        .section-title span { color: var(--ouro); }

        /* BOTÕES */
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-gold { background: linear-gradient(135deg, var(--ouro), var(--caramelo)); color: white; }
        .btn-gold:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-dark { background: var(--chocolate); color: var(--creme); }
        .btn-dark:hover { background: var(--cacau); }
        .btn-green { background: var(--verde-menta); color: white; }
        .btn-red { background: var(--vermelho-alerta); color: white; }
        .btn-ghost { background: var(--creme); color: var(--chocolate); border: 1px solid #ddd; }
        .btn-ghost:hover { background: #eee; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        /* FORM CARD */
        .form-card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 2px 12px rgba(45,26,14,0.08); margin-bottom: 24px; }
        .form-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--chocolate); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--creme); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--trufa); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .form-input, .form-select, .form-textarea {
            padding: 10px 14px;
            border: 2px solid var(--creme);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--chocolate);
            background: var(--branco-creme);
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--ouro); }
        .form-textarea { resize: vertical; min-height: 80px; }

        /* TABLE */
        .table-card { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(45,26,14,0.08); overflow: hidden; margin-bottom: 24px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--chocolate); }
        thead th { padding: 14px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ouro); }
        tbody tr { border-bottom: 1px solid var(--creme); transition: background 0.15s; }
        tbody tr:hover { background: var(--branco-creme); }
        tbody td { padding: 14px 16px; font-size: 14px; }

        /* BADGES */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-green { background: #e8f5e9; color: #2e7d32; }
        .badge-red { background: #ffebee; color: #c62828; }
        .badge-yellow { background: #fff8e1; color: #f57f17; }
        .badge-blue { background: #e3f2fd; color: #1565c0; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--chocolate); margin-bottom: 20px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 24px; }

        /* TABS */
        .tab-group { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 16px; border: 2px solid var(--creme); border-radius: 8px; background: white; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--trufa); transition: all 0.2s; }
        .tab-btn.active { background: var(--chocolate); color: var(--ouro); border-color: var(--chocolate); }

        /* CLIENTES - ABASTECIMENTO */
        .client-card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 10px rgba(45,26,14,0.07); margin-bottom: 14px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .client-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, var(--ouro), var(--caramelo)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; }
        .client-info { flex: 1; min-width: 140px; }
        .client-name { font-weight: 700; font-size: 16px; color: var(--chocolate); }
        .client-meta { font-size: 12px; color: #888; margin-top: 2px; }
        .client-stats { display: flex; gap: 20px; flex-wrap: wrap; }
        .client-stat { text-align: center; }
        .client-stat-val { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--chocolate); }
        .client-stat-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .client-actions { display: flex; gap: 8px; }

        /* ALERT CARD */
        .alert-card { border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 12px; }
        .alert-card.danger { background: #ffebee; border-left: 4px solid var(--vermelho-alerta); }
        .alert-card.warning { background: #fff8e1; border-left: 4px solid #FFA000; }
        .alert-card.success { background: #e8f5e9; border-left: 4px solid var(--verde-menta); }
        .alert-icon { font-size: 20px; }
        .alert-text strong { display: block; font-size: 14px; color: var(--chocolate); }
        .alert-text span { font-size: 12px; color: #666; }

        /* GRÁFICO SIMPLES */
        .chart-bar-wrap { margin-top: 16px; }
        .chart-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .chart-label { width: 120px; font-size: 12px; color: var(--trufa); text-align: right; flex-shrink: 0; }
        .chart-bar-bg { flex: 1; background: var(--creme); border-radius: 6px; height: 20px; overflow: hidden; }
        .chart-bar { height: 100%; background: linear-gradient(90deg, var(--trufa), var(--ouro)); border-radius: 6px; transition: width 0.6s ease; min-width: 4px; }
        .chart-val { width: 70px; font-size: 12px; font-weight: 600; color: var(--chocolate); }

        /* RESUMO FINANCEIRO */
        .finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .finance-box { background: var(--branco-creme); border-radius: 12px; padding: 20px; }
        .finance-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--trufa); margin-bottom: 16px; }
        .finance-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--creme); font-size: 13px; }
        .finance-row:last-child { border-bottom: none; }
        .finance-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; font-weight: 700; font-size: 15px; margin-top: 4px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--creme); }
        ::-webkit-scrollbar-thumb { background: var(--caramelo); border-radius: 3px; }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .content { padding: 16px; }
            .metrics-grid { grid-template-columns: 1fr 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .finance-grid { grid-template-columns: 1fr; }
        }

        /* EMPTY STATE */
        .empty { text-align: center; padding: 48px 24px; color: #bbb; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty p { font-size: 15px; }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div id="app-root"></div>

<script>
const DATA_KEY = 'trufflecrm_v2';

const App = {
    user: null,
    page: 'dashboard',
    data: {
        clientes: [],
        vendas: [],
        custos: [],
        configuracoes: {
            precoMedioPorUnidade: 5.00,
            custoPorUnidade: 1.80,
            meta_mensal: 3000
        }
    },

    init() {
        const saved = localStorage.getItem(DATA_KEY);
        if (saved) {
            try { this.data = { ...this.data, ...JSON.parse(saved) }; } catch(e) {}
        }
        this.render();
    },

    save() {
        localStorage.setItem(DATA_KEY, JSON.stringify(this.data));
    },

    login(nome) {
        if (!nome.trim()) return alert('Digite seu nome!');
        this.user = nome.trim();
        this.render();
    },

    logout() {
        this.user = null;
        this.render();
    },

    navigate(p) {
        this.page = p;
        this.render();
        window.scrollTo(0,0);
    },

    /* ─── CLIENTES ─── */
    adicionarCliente(dados) {
        const c = {
            id: Date.now(),
            nome: dados.nome,
            telefone: dados.telefone || '',
            endereco: dados.endereco || '',
            tipo: dados.tipo || 'Varejo',
            limiteCreditoMax: parseFloat(dados.limiteCredito) || 500,
            saldoDevedor: 0,
            dataCadastro: new Date().toISOString().split('T')[0],
            ativo: true
        };
        this.data.clientes.push(c);
        this.save();
    },

    editarCliente(id, dados) {
        const c = this.data.clientes.find(c => c.id === id);
        if (!c) return;
        Object.assign(c, {
            nome: dados.nome,
            telefone: dados.telefone || '',
            endereco: dados.endereco || '',
            tipo: dados.tipo || 'Varejo',
            limiteCreditoMax: parseFloat(dados.limiteCredito) || 500
        });
        this.save();
    },

    getClienteStats(clienteId) {
        const vendasCliente = this.data.vendas.filter(v => v.clienteId === clienteId);
        const totalGasto = vendasCliente.reduce((s, v) => s + v.total, 0);
        const totalUnidades = vendasCliente.reduce((s, v) => s + v.quantidade, 0);
        const mesAtual = new Date().toISOString().slice(0,7);
        const vendasMes = vendasCliente.filter(v => v.data.startsWith(mesAtual));
        const totalMes = vendasMes.reduce((s, v) => s + v.total, 0);
        return { totalGasto, totalUnidades, vendasMes: vendasMes.length, totalMes, ultimaCompra: vendasCliente.length > 0 ? vendasCliente.sort((a,b) => b.data.localeCompare(a.data))[0].data : null };
    },

    /* ─── VENDAS ─── */
    registrarVenda(dados) {
        const cliente = this.data.clientes.find(c => c.id === parseInt(dados.clienteId));
        if (!cliente) return alert('Selecione um cliente!');
        const qtd = parseInt(dados.quantidade) || 0;
        const preco = parseFloat(dados.precoUnit) || 0;
        if (qtd <= 0 || preco <= 0) return alert('Quantidade e preço devem ser válidos!');
        const total = qtd * preco;
        const venda = {
            id: Date.now(),
            clienteId: cliente.id,
            clienteNome: cliente.nome,
            produto: dados.produto || 'Trufas Artesanais',
            quantidade: qtd,
            precoUnit: preco,
            total,
            formaPagamento: dados.formaPagamento || 'Dinheiro',
            status: dados.status || 'Pago',
            data: dados.data || new Date().toISOString().split('T')[0],
            observacoes: dados.obs || ''
        };
        if (venda.status === 'A Prazo' || venda.status === 'Pendente') {
            cliente.saldoDevedor += total;
        }
        this.data.vendas.push(venda);
        this.save();
    },

    pagarDebito(clienteId, valor) {
        const cliente = this.data.clientes.find(c => c.id === clienteId);
        if (!cliente) return;
        const v = parseFloat(valor) || 0;
        cliente.saldoDevedor = Math.max(0, cliente.saldoDevedor - v);
        // Registra pagamento
        this.data.vendas.push({
            id: Date.now(),
            clienteId: cliente.id,
            clienteNome: cliente.nome,
            produto: 'Pagamento de Dívida',
            quantidade: 0,
            precoUnit: 0,
            total: -v,
            formaPagamento: 'Pagamento',
            status: 'Pago',
            data: new Date().toISOString().split('T')[0],
            observacoes: 'Quitação parcial/total de débito'
        });
        this.save();
    },

    deletarVenda(id) {
        if (!confirm('Excluir esta venda?')) return;
        const v = this.data.vendas.find(x => x.id === id);
        if (v && (v.status === 'A Prazo' || v.status === 'Pendente')) {
            const c = this.data.clientes.find(c => c.id === v.clienteId);
            if (c) c.saldoDevedor = Math.max(0, c.saldoDevedor - v.total);
        }
        this.data.vendas = this.data.vendas.filter(x => x.id !== id);
        this.save();
    },

    /* ─── CUSTOS ─── */
    registrarCusto(dados) {
        this.data.custos.push({
            id: Date.now(),
            descricao: dados.descricao,
            valor: parseFloat(dados.valor) || 0,
            categoria: dados.categoria || 'Ingrediente',
            data: dados.data || new Date().toISOString().split('T')[0]
        });
        this.save();
    },

    deletarCusto(id) {
        if (!confirm('Excluir este custo?')) return;
        this.data.custos = this.data.custos.filter(c => c.id !== id);
        this.save();
    },

    /* ─── CÁLCULOS ─── */
    getMesAtual() { return new Date().toISOString().slice(0,7); },

    getVendasMes(mes) {
        mes = mes || this.getMesAtual();
        return this.data.vendas.filter(v => v.data.startsWith(mes) && v.total > 0);
    },

    getCustosMes(mes) {
        mes = mes || this.getMesAtual();
        return this.data.custos.filter(c => c.data.startsWith(mes));
    },

    getFaturamentoMes(mes) {
        return this.getVendasMes(mes).reduce((s, v) => s + v.total, 0);
    },

    getCustosTotalMes(mes) {
        return this.getCustosMes(mes).reduce((s, c) => s + c.valor, 0);
    },

    getLucroMes(mes) {
        return this.getFaturamentoMes(mes) - this.getCustosTotalMes(mes);
    },

    getClientesComDebito() {
        return this.data.clientes.filter(c => c.saldoDevedor > 0).sort((a,b) => b.saldoDevedor - a.saldoDevedor);
    },

    getTotalDebitoAberto() {
        return this.data.clientes.reduce((s, c) => s + c.saldoDevedor, 0);
    },

    getVendasPorCliente() {
        const map = {};
        this.data.vendas.filter(v => v.total > 0).forEach(v => {
            if (!map[v.clienteNome]) map[v.clienteNome] = 0;
            map[v.clienteNome] += v.total;
        });
        return Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,8);
    },

    getAbastecimentoMes() {
        // Quantas vezes cada cliente comprou este mês
        const mes = this.getMesAtual();
        const map = {};
        this.data.vendas.filter(v => v.data.startsWith(mes) && v.total > 0).forEach(v => {
            if (!map[v.clienteId]) map[v.clienteId] = { nome: v.clienteNome, compras: 0, total: 0, unidades: 0 };
            map[v.clienteId].compras++;
            map[v.clienteId].total += v.total;
            map[v.clienteId].unidades += v.quantidade;
        });
        return Object.values(map).sort((a,b) => b.compras - a.compras);
    },

    exportarExcel() {
        const mes = this.getMesAtual();
        const vendasMes = this.getVendasMes(mes);
        const custosMes = this.getCustosMes(mes);

        const dadosVendas = vendasMes.map(v => ({
            'Data': v.data,
            'Cliente': v.clienteNome,
            'Produto': v.produto,
            'Qtd': v.quantidade,
            'Preço Unit (R$)': v.precoUnit.toFixed(2),
            'Total (R$)': v.total.toFixed(2),
            'Pagamento': v.formaPagamento,
            'Status': v.status,
            'Obs': v.observacoes
        }));

        const dadosCustos = custosMes.map(c => ({
            'Data': c.data,
            'Descrição': c.descricao,
            'Categoria': c.categoria,
            'Valor (R$)': c.valor.toFixed(2)
        }));

        const fat = this.getFaturamentoMes(mes);
        const custo = this.getCustosTotalMes(mes);
        const lucro = this.getLucroMes(mes);
        const margem = fat > 0 ? ((lucro / fat)*100).toFixed(1) : 0;

        const resumo = [
            { 'Indicador': 'Faturamento Bruto', 'Valor': `R$ ${fat.toFixed(2)}` },
            { 'Indicador': 'Custos Totais', 'Valor': `R$ ${custo.toFixed(2)}` },
            { 'Indicador': 'Lucro Líquido', 'Valor': `R$ ${lucro.toFixed(2)}` },
            { 'Indicador': 'Margem de Lucro', 'Valor': `${margem}%` },
            { 'Indicador': 'Total de Vendas', 'Valor': vendasMes.length }
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dadosVendas), 'Vendas');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dadosCustos), 'Custos');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumo), 'Resumo Financeiro');
        XLSX.writeFile(wb, `TruffleCRM_${mes}.xlsx`);
    },

        if (percMeta >= 80) alertas.push({tipo:'success', icon:'🏆', titulo:`${percMeta}% da meta atingida!`, sub:`Faltam R$ ${Math.max(0, meta-fat).toFixed(2)} para bater a meta`});
        else if (percMeta >= 50) alertas.push({tipo:'warning', icon:'⚠️', titulo:`${percMeta}% da meta atingida`, sub:`Acelere as vendas! Meta: R$ ${meta.toFixed(2)}`});

        this.data.clientes.forEach(c => {

            if (stats.ultimaCompra) {

                </div>

                    <div class="metric-label">Custos do Mês</div>

                </div>
            </div>

            <!-- Meta -->

                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

                </div>

            <!-- Alertas -->
            ${alertas.length > 0 ? `
            <div class="form-card" style="margin-bottom:24px">
                <div class="form-title">🔔 Alertas e Atenção</div>

            <!-- Gráfico de clientes -->

                <div class="form-card" style="grid-column:span 1">

                    <div class="chart-bar-wrap">
                        ${vendasPorCliente.map(([nome, val]) => `
                            <div class="chart-row">
                                <div class="chart-label">${nome.split(' ')[0]}</div>
                                <div class="chart-bar-bg"><div class="chart-bar" style="width:${(val/maxVal*100)}%"></div></div>
                                <div class="chart-val">R$ ${val.toFixed(0)}</div>
                            </div>
                        `).join('')}
                    </div>
                    `}
                </div>

                <div class="form-card" style="grid-column:span 1">
                    <div class="form-title">🚨 Débitos em Aberto</div>
                    ${debClientes.length === 0 ? '<div class="empty"><div class="empty-icon">✅</div><p>Nenhum débito em aberto!</p></div>' : `

                                    <button class="btn btn-ghost btn-sm" onclick="App.abrirPagarDebito(${c.id})">💳 Registrar Pagamento</button>
                                </div>
                            </div>
                        `).join('')}
                    `}
                </div>
            </div>

            <!-- Últimas vendas -->
            <div class="table-card" style="margin-top:24px">
                <div style="padding:20px;display:flex;justify-content:space-between;align-items:center">

                ${abastecimento.length === 0 ? '<div class="empty"><div class="empty-icon">📦</div><p>Nenhuma entrega registrada este mês</p></div>' : `
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Cliente</th><th>Entregas no Mês</th><th>Total (un.)</th><th>Valor do Mês</th><th>Frequência</th></tr></thead>
                        <tbody>
                            ${abastecimento.map(a => {
                                const freq = a.compras >= 4 ? 'badge-green' : a.compras >= 2 ? 'badge-blue' : 'badge-yellow';
                                const freqLabel = a.compras >= 4 ? 'Alta' : a.compras >= 2 ? 'Média' : 'Baixa';
                                return `<tr>
                                    <td style="font-weight:600">${a.nome}</td>
                                    <td style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--trufa)">${a.compras}x</td>
                                    <td>${a.unidades} un.</td>
                                    <td style="font-weight:700">R$ ${a.total.toFixed(2)}</td>
                                    <td><span class="badge ${freq}">${freqLabel}</span></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`}
            </div>

            <div class="form-card">
                <div class="form-title">📈 Evolução de Vendas por Mês</div>
                <div class="chart-bar-wrap">
                    ${meses.reverse().map(m => {
                        const fat = this.getFaturamentoMes(m);
                        const meta = this.data.configuracoes.meta_mensal || 3000;
                        const perc = Math.min(100, (fat/meta*100));
                        const nomesMes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
                        const [ano, mesN] = m.split('-');
                        const label = `${nomesMes[parseInt(mesN)-1]}/${ano}`;
                        return `
                        <div class="chart-row">
                            <div class="chart-label">${label}</div>
                            <div class="chart-bar-bg"><div class="chart-bar" style="width:${perc}%"></div></div>
                            <div class="chart-val">R$ ${fat.toFixed(0)}</div>
                        </div>`;
                    }).join('')}
                </div>
                <div style="font-size:12px;color:#999;margin-top:8px">Barra baseada na meta de R$ ${(this.data.configuracoes.meta_mensal||3000).toFixed(2)}</div>
            </div>

            <!-- Clientes sem comprar há muito tempo -->
            <div class="form-card">
                <div class="form-title">⏰ Clientes para Reativar</div>
                ${(() => {
                    const hoje = new Date();
                    const inativos = this.data.clientes.map(c => {
                        const stats = this.getClienteStats(c.id);
                        if (!stats.ultimaCompra) return { ...c, dias: 999 };
                        const dias = Math.floor((hoje - new Date(stats.ultimaCompra)) / 86400000);
                        return { ...c, dias };
                    }).filter(c => c.dias >= 20).sort((a,b) => b.dias - a.dias);
                    if (inativos.length === 0) return '<div class="empty"><div class="empty-icon">🎉</div><p>Todos os clientes compraram recentemente!</p></div>';
                    return inativos.map(c => `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--creme)">
                            <div>
                                <div style="font-weight:600">${c.nome}</div>
                                <div style="font-size:12px;color:#888">${c.telefone || 'Sem telefone'}</div>
                            </div>
                            <div style="text-align:right">
                                <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#c62828">${c.dias === 999 ? 'Nunca comprou' : c.dias + ' dias'}</div>
                                <div style="font-size:11px;color:#999">sem comprar</div>
                            </div>
                        </div>
                    `).join('');
                })()}
            </div>
        </div>`;
    },

    renderFinanceiro() {
        const mes = this.getMesAtual();
        const fat = this.getFaturamentoMes(mes);
        const custo = this.getCustosTotalMes(mes);
        const lucro = this.getLucroMes(mes);
        const margem = fat > 0 ? ((lucro/fat)*100).toFixed(1) : 0;
        const custosMes = this.getCustosMes(mes);
        const meses = [];
        for (let i = 0; i < 6; i++) { const d = new Date(); d.setMonth(d.getMonth()-i); meses.push(d.toISOString().slice(0,7)); }

        return `
        <div>
            <div class="section-header">
                <div class="section-title">Painel <span>Financeiro</span></div>
                <button class="btn btn-gold" onclick="App.abrirModalCusto()">➕ Lançar Custo</button>
            </div>

            <!-- KPIs financeiros -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Faturamento Bruto</div>
                    <div class="metric-value">R$ ${fat.toFixed(2)}</div>
                    <div class="metric-sub">Total de vendas pagas</div>
                </div>
                <div class="metric-card vermelho">
                    <div class="metric-label">Custos Totais</div>
                    <div class="metric-value" style="color:#c62828">R$ ${custo.toFixed(2)}</div>
                    <div class="metric-sub">${custosMes.length} lançamento(s)</div>
                </div>
                <div class="metric-card verde">
                    <div class="metric-label">Lucro Líquido</div>
                    <div class="metric-value" style="color:${lucro>=0?'#2e7d32':'#c62828'}">R$ ${lucro.toFixed(2)}</div>
                    <div class="metric-sub">Margem: ${margem}%</div>
                </div>
                <div class="metric-card azul">
                    <div class="metric-label">Débito a Receber</div>
                    <div class="metric-value" style="color:var(--azul-info)">R$ ${this.getTotalDebitoAberto().toFixed(2)}</div>
                    <div class="metric-sub">Valores a receber</div>
                </div>
            </div>

            <!-- Análise lucro x faturamento -->
            <div class="form-card">
                <div class="form-title">📊 Análise Mensal (últimos 6 meses)</div>
                ${meses.reverse().map(m => {
                    const f = this.getFaturamentoMes(m);
                    const c2 = this.getCustosTotalMes(m);
                    const l = f - c2;
                    const maxF = Math.max(...meses.map(x=>this.getFaturamentoMes(x)), 1);
                    const nomesMes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
                    const [ano, mesN] = m.split('-');
                    return `
                    <div style="margin-bottom:16px">
                        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
                            <strong>${nomesMes[parseInt(mesN)-1]}/${ano}</strong>
                            <span style="color:${l>=0?'#2e7d32':'#c62828'}">Lucro: R$ ${l.toFixed(2)}</span>
                        </div>
                        <div style="display:flex;gap:4px;align-items:center">
                            <span style="font-size:11px;color:#888;width:60px">Fat.</span>
                            <div style="flex:1;background:var(--creme);border-radius:6px;height:12px;overflow:hidden">
                                <div style="height:100%;width:${f/maxF*100}%;background:linear-gradient(90deg,var(--trufa),var(--ouro));border-radius:6px"></div>
                            </div>
                            <span style="font-size:11px;width:80px;text-align:right">R$ ${f.toFixed(0)}</span>
                        </div>
                        <div style="display:flex;gap:4px;align-items:center;margin-top:4px">
                            <span style="font-size:11px;color:#888;width:60px">Custo</span>
                            <div style="flex:1;background:var(--creme);border-radius:6px;height:12px;overflow:hidden">
                                <div style="height:100%;width:${c2/maxF*100}%;background:#ef9a9a;border-radius:6px"></div>
                            </div>
                            <span style="font-size:11px;width:80px;text-align:right">R$ ${c2.toFixed(0)}</span>
                        </div>
                    </div>`;
                }).join('')}
            </div>

            <!-- Custos do mês -->
            <div class="table-card">
                <div style="padding:20px">
                    <span style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--chocolate)">Custos Lançados Este Mês</span>
                </div>
                <div class="table-wrap">
                    ${custosMes.length === 0 ? '<div class="empty"><div class="empty-icon">💰</div><p>Nenhum custo lançado este mês</p></div>' : `
                    <table>
                        <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th></th></tr></thead>
                        <tbody>
                            ${custosMes.sort((a,b)=>b.data.localeCompare(a.data)).map(c => `
                            <tr>
                                <td>${c.data}</td>
                                <td style="font-weight:600">${c.descricao}</td>
                                <td><span class="badge badge-blue">${c.categoria}</span></td>
                                <td style="font-weight:700;color:#c62828">R$ ${c.valor.toFixed(2)}</td>
                                <td><button class="btn btn-red btn-sm" onclick="App.deletarCusto(${c.id});App.navigate('financeiro')">🗑️</button></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>`}
                </div>
            </div>
        </div>`;
    },

    renderConfig() {
        const cfg = this.data.configuracoes;
        return `
        <div>
            <div class="section-title" style="margin-bottom:24px">Configurações <span style="color:var(--ouro)">do Sistema</span></div>
            <div class="form-card" style="max-width:500px">
                <div class="form-title">⚙️ Parâmetros do Negócio</div>
                <div class="form-group" style="margin-bottom:16px">
                    <label class="form-label">Preço padrão por unidade (R$)</label>
                    <input class="form-input" id="cfg_preco" type="number" step="0.01" value="${cfg.precoMedioPorUnidade}" />
                </div>
                <div class="form-group" style="margin-bottom:16px">
                    <label class="form-label">Custo médio por unidade (R$)</label>
                    <input class="form-input" id="cfg_custo" type="number" step="0.01" value="${cfg.custoPorUnidade}" />
                </div>
                <div class="form-group" style="margin-bottom:20px">
                    <label class="form-label">Meta de faturamento mensal (R$)</label>
                    <input class="form-input" id="cfg_meta" type="number" step="0.01" value="${cfg.meta_mensal}" />
                </div>
                <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="App.salvarConfig()">💾 Salvar Configurações</button>
                <div style="margin-top:24px;padding-top:20px;border-top:2px solid var(--creme)">
                    <div style="font-size:13px;color:#888;margin-bottom:12px">Sistema — ${this.data.clientes.length} cliente(s), ${this.data.vendas.length} venda(s), ${this.data.custos.length} custo(s)</div>
                    <button class="btn btn-ghost" style="width:100%;justify-content:center;color:#c62828" onclick="if(confirm('Limpar TODOS os dados? Esta ação não pode ser desfeita!')) { App.data = {clientes:[],vendas:[],custos:[],configuracoes:{precoMedioPorUnidade:5,custoPorUnidade:1.8,meta_mensal:3000}}; App.save(); App.navigate('dashboard'); }">🗑️ Limpar Todos os Dados</button>
                </div>
            </div>
        </div>`;
    },

    salvarConfig() {
        this.data.configuracoes.precoMedioPorUnidade = parseFloat(document.getElementById('cfg_preco')?.value) || 5;
        this.data.configuracoes.custoPorUnidade = parseFloat(document.getElementById('cfg_custo')?.value) || 1.8;
        this.data.configuracoes.meta_mensal = parseFloat(document.getElementById('cfg_meta')?.value) || 3000;
        this.save();
        alert('✅ Configurações salvas!');
    },

    /* ─── MODAIS ─── */
    _modalCliente: null,
    _modalCusto: false,
    _modalPagarId: null,

    abrirModalCliente(id) {
        this._modalCliente = id || 'novo';
        this.render();
        setTimeout(() => document.getElementById('modal-cliente')?.classList.add('open'), 50);
    },

    abrirModalCusto() {
        this._modalCusto = true;
        this.render();
        setTimeout(() => document.getElementById('modal-custo')?.classList.add('open'), 50);
    },

    abrirPagarDebito(id) {
        this._modalPagarId = id;
        this.render();
        setTimeout(() => document.getElementById('modal-pagar')?.classList.add('open'), 50);
    },

    fecharModais() {
        this._modalCliente = null;
        this._modalCusto = false;
        this._modalPagarId = null;
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
    },

    salvarCliente() {
        const nome = document.getElementById('mc_nome')?.value;
        if (!nome?.trim()) return alert('Nome obrigatório!');
        const dados = {
            nome: nome.trim(),
            telefone: document.getElementById('mc_tel')?.value,
            endereco: document.getElementById('mc_end')?.value,
            tipo: document.getElementById('mc_tipo')?.value,
            limiteCredito: document.getElementById('mc_limite')?.value
        };
        if (this._modalCliente === 'novo') {
            this.adicionarCliente(dados);
            alert('✅ Cliente cadastrado!');
        } else {
            this.editarCliente(this._modalCliente, dados);
            alert('✅ Cliente atualizado!');
        }
        this.fecharModais();
        this.navigate('clientes');
    },

    salvarCusto() {
        const desc = document.getElementById('mc2_desc')?.value;
        const val = document.getElementById('mc2_val')?.value;
        if (!desc || !val) return alert('Preencha todos os campos!');
        this.registrarCusto({
            descricao: desc,
            valor: val,
            categoria: document.getElementById('mc2_cat')?.value,
            data: document.getElementById('mc2_data')?.value
        });
        alert('✅ Custo lançado!');
        this.fecharModais();
        this.navigate('financeiro');
    },

    salvarPagamento() {
        const val = document.getElementById('mp_val')?.value;
        if (!val || parseFloat(val) <= 0) return alert('Digite um valor válido!');
        this.pagarDebito(this._modalPagarId, val);
        alert('✅ Pagamento registrado!');
        this.fecharModais();
        this.navigate('dashboard');
    },

    renderModals() {
        const clienteEdit = this._modalCliente && this._modalCliente !== 'novo' ? this.data.clientes.find(c=>c.id===this._modalCliente) : null;
        const clienteDebito = this._modalPagarId ? this.data.clientes.find(c=>c.id===this._modalPagarId) : null;

        return `
        <!-- Modal Cliente -->
        <div class="modal-overlay" id="modal-cliente" onclick="if(event.target===this) App.fecharModais()">
            <div class="modal-box">
                <div class="modal-title">${this._modalCliente === 'novo' ? '➕ Novo Cliente' : '✏️ Editar Cliente'}</div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Nome *</label>
                    <input class="form-input" id="mc_nome" value="${clienteEdit?.nome||''}" placeholder="Nome completo ou apelido" />
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Telefone / WhatsApp</label>
                    <input class="form-input" id="mc_tel" value="${clienteEdit?.telefone||''}" placeholder="(11) 99999-9999" />
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Endereço / Bairro</label>
                    <input class="form-input" id="mc_end" value="${clienteEdit?.endereco||''}" placeholder="Ex: Centro, Rua das Flores" />
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Tipo de Cliente</label>
                    <select class="form-select" id="mc_tipo">
                        ${['Varejo','Atacado','Revenda','Evento','Presente'].map(t => `<option ${clienteEdit?.tipo===t?'selected':''}>${t}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Limite de Crédito (R$)</label>
                    <input class="form-input" id="mc_limite" type="number" value="${clienteEdit?.limiteCreditoMax||500}" />
                </div>
                <div class="modal-footer">
                    <button class="btn btn-gold" style="flex:1;justify-content:center" onclick="App.salvarCliente()">💾 Salvar</button>
                    <button class="btn btn-ghost" onclick="App.fecharModais()">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Modal Custo -->
        <div class="modal-overlay" id="modal-custo" onclick="if(event.target===this) App.fecharModais()">
            <div class="modal-box">
                <div class="modal-title">💸 Lançar Custo</div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Descrição *</label>
                    <input class="form-input" id="mc2_desc" placeholder="Ex: Chocolate meio amargo, Embalagens..." />
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Valor (R$) *</label>
                    <input class="form-input" id="mc2_val" type="number" step="0.01" placeholder="0.00" />
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Categoria</label>
                    <select class="form-select" id="mc2_cat">
                        ${['Ingrediente','Embalagem','Gás/Energia','Transporte','Equipamento','Rótulo/Marketing','Outros'].map(c=>`<option>${c}</option>`).join('')}
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:12px">
                    <label class="form-label">Data</label>
                    <input class="form-input" id="mc2_data" type="date" value="${new Date().toISOString().split('T')[0]}" />
                </div>
                <div class="modal-footer">
                    <button class="btn btn-gold" style="flex:1;justify-content:center" onclick="App.salvarCusto()">💾 Lançar</button>
                    <button class="btn btn-ghost" onclick="App.fecharModais()">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Modal Pagar Débito -->
        <div class="modal-overlay" id="modal-pagar" onclick="if(event.target===this) App.fecharModais()">
            <div class="modal-box">
                <div class="modal-title">💳 Registrar Pagamento</div>
                ${clienteDebito ? `
                <div style="background:var(--creme);border-radius:12px;padding:16px;margin-bottom:20px">
                    <div style="font-weight:700;font-size:16px">${clienteDebito.nome}</div>
                    <div style="font-size:14px;color:#c62828;margin-top:4px">Saldo devedor: R$ ${clienteDebito.saldoDevedor.toFixed(2)}</div>
                </div>
                <div class="form-group" style="margin-bottom:16px">
                    <label class="form-label">Valor recebido (R$)</label>
                    <input class="form-input" id="mp_val" type="number" step="0.01" value="${clienteDebito.saldoDevedor.toFixed(2)}" />
                </div>
                <div class="modal-footer">
                    <button class="btn btn-green" style="flex:1;justify-content:center" onclick="App.salvarPagamento()">✅ Confirmar Pagamento</button>
                    <button class="btn btn-ghost" onclick="App.fecharModais()">Cancelar</button>
                </div>
                ` : ''}
            </div>
        </div>`;
    }
};

App.init();
</script>
</body>
</html>
